<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Punchi Battle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>PUNCHI BATTLE</h1>
        <p>Quand les mots deviennent des armes.</p>
    </header>

    <main>

        <section class="theme">
            <h2>🔥 Thème du jour :</h2>
            <p id="theme-text">La trahison</p>
        </section>

        <section class="battle">

            <div class="card">
                <p class="punchline">"J’ai serré des mains qui cachaient des couteaux."</p>
                <button onclick="vote()">🔥 Voter</button>
            </div>

            <div class="card">
                <p class="punchline">"Ils parlaient d’amour mais visaient mon dos."</p>
                <button onclick="vote()">🔥 Voter</button>
            </div>

            <div class="card">
                <p class="punchline">"La loyauté coûte cher, les traîtres sont gratuits."</p>
                <button onclick="vote()">🔥 Voter</button>
            </div>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
